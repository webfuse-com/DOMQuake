<!DOCTYPE html>
<html>
    <head>
        <title>Test</title>
        <script>
            window.addEventListener("load", () => {
                const widgetEl = document.getElementById("widget");

                const hydrateComponent = async (i, throttleMs = 0) => {
                    const html = `
                        <section>
                            <h2>Lorem Ipsum ${i}</h2>
                            <p>
                                ${
                                    "Lorem ispum dolor sit amet. ".repeat(Math.round(Math.random() * 4 + 1))
                                }
                            </p>
                        </section>
                    `;

                    await new Promise(r => setTimeout(r, throttleMs));

                    return new Promise(resolve => {
                        requestIdleCallback(() => {
                            widgetEl.innerHTML = html;

                            resolve();
                        });
                    });
                }

                const hydrate = async (init = false) => {
                    const hydrations = [];

                    !init && window.__signalEvent("transition");

                    await hydrateComponent(0, Math.random() * 10)

                    window.__signalEvent("idle");
                }

                hydrate(true);

                setInterval(hydrate, 3000);
            });
        </script>
    </head>
    <body>
        <h1>Test</h1>
        <section>
            <div>
                <div id="widget"></div>
            </div>
        </section>
        <template id="section-template">
            <section>
                <h2>Lorem Ipsum</h2>
                <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
            </section>
        </template>
        <script>
            for(let i = 0; i < 7; i++) {
                const clone = document.getElementById("section-template")
                    .content
                    .cloneNode(true);

                document.body.appendChild(clone);
            }
        </script>
    </body>
</html>
