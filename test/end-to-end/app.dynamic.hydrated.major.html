<!DOCTYPE html>
<html>
<head>
    <title>SPA Hydration Demo</title>
    <style>
        section {
            opacity: 0;
            transition: opacity 500ms;
        }
        section.visible {
            opacity: 1;
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const appEl = document.getElementById("app");

            const hydrateComponent = async (i, throttleMs = 0) => {
                const html = `
                    <section>
                        <h2>Lorem Ipsum ${i}</h2>
                        <p>
                            ${
                                "Lorem ispum dolor sit amet. ".repeat(Math.round(Math.random() * 4 + 1))
                            }
                        </p>
                    </section>
                `;

                await new Promise(r => setTimeout(r, throttleMs));

                return new Promise(resolve => {
                    requestIdleCallback(() => {
                        let containerEl = appEl.querySelector(`div[data-index="${i}"]`);
                        
                        if(!containerEl) {
                            containerEl = document.createElement("div");
                            containerEl.setAttribute("data-index", i);

                            appEl.appendChild(containerEl);
                        }

                        containerEl.innerHTML = html;

                        requestAnimationFrame(() => {
                            containerEl.querySelector("section").classList.add("visible");

                            resolve();
                        });
                    });
                });
            }

            const hydrate = async () => {
                const hydrations = [];

                window.__signalEvent("transition");

                for(let i = 0; i < 3; i++) {
                    hydrations.push(
                        hydrateComponent(i, Math.random() * 10)
                    );
                }

                await Promise.all(hydrations);

                window.__signalEvent("idle");
            }

            hydrate();

            setInterval(hydrate, 2000);
        });
    </script>
</head>
<body>
    <h1>Test</h1>
    <div id="app"></div>
</body>
</html>
